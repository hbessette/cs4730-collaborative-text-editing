# Cluster hostnames for latency evaluation.
# One hostname per line. Blank lines and lines starting with '#' are ignored.
#
# The FIRST host is used as the SENDER (generates 1000 INSERT operations).
# All remaining hosts are RECEIVERS.
#
# Minimum 2 hosts for the 2-peer experiment.
# All 5 hosts are used for the 5-peer experiment (skipped if fewer than 5).
#
# Requirements:
#   - Passwordless SSH from the machine running latency_eval.sh to each host
#   - p2p-editor binary built on each host (set path with --binary or $REMOTE_BINARY)
#   - NTP-synchronized clocks
#
